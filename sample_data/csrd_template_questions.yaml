CSRD_TEMPLATE_QUESTIONS:
  - What are the company's Scope 1 and Scope 2 GHG emissions for the latest reporting year?
  - What climate-related targets (e.g. 2030) are disclosed and are they science-based?
  - How does the report address ESRS E1 (Climate change) and the transition plan?
  - What share of revenue or CapEx is aligned with the EU Taxonomy?
  - What governance arrangements oversee sustainability reporting (board, committees)?
  - What are the main risks and opportunities related to climate change?
  - How is workforce health, safety, or diversity addressed (ESRS S1)?
  - What biodiversity or water-related impacts are reported (ESRS E2–E4)?
  - How is value chain due diligence on social or environmental matters described?
  - What assurance level (limited vs reasonable) applies to sustainability information?